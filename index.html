<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird | AI Làm Game?</title>
    <link rel="icon" type="image/png" href="flappy-bird.png">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 480px;
            background-color: #70c5ce;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            transition: background-color 1s;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 10;
            background: rgba(0, 0, 0, 0.4);
        }

        .hidden {
            display: none !important;
        }

        /* Top Bar */
        #top-bar {
            position: absolute;
            top: 5%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 5;
            pointer-events: none;
        }

        .stats-text {
            font-size: 24px;
            font-weight: bold;
            color: white;
            -webkit-text-stroke: 1px black;
            text-shadow: 2px 2px 0 #000;
        }

        #score-board {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 50px;
            font-weight: bold;
            color: white;
            -webkit-text-stroke: 2px black;
            text-shadow: 3px 3px 0 #000;
            z-index: 5;
            pointer-events: none;
        }

        #effects-board {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 5;
            pointer-events: none;
        }

        .effect-badge {
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Panels */
        .panel {
            background: #ded895;
            border: 4px solid #543847;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 0 #543847;
            pointer-events: auto;
            color: #543847;
            width: 85%;
            max-width: 350px;
        }

        .panel h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .panel p {
            font-size: 15px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .score-box {
            background: rgba(255, 255, 255, 0.5);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-around;
        }

        .btn-container {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            background: #e67e22;
            color: white;
            border: 3px solid #fff;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #d35400;
            transition: transform 0.1s;
            flex: 1;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #d35400;
        }

        .btn-blue { background: #3498db; box-shadow: 0 4px 0 #2980b9; }
        .btn-blue:active { box-shadow: 0 0 0 #2980b9; }
        .btn-green { background: #2ecc71; box-shadow: 0 4px 0 #27ae60; }
        .btn-green:active { box-shadow: 0 0 0 #27ae60; }

        /* Shop UI */
        .shop-items {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
            max-height: 250px;
            overflow-y: auto;
        }

        .shop-item {
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid #543847;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .skin-preview {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #000;
            margin-bottom: 5px;
        }

        .shop-btn {
            padding: 5px 10px;
            font-size: 14px;
            border: 2px solid #fff;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            width: 100%;
        }

        .btn-buy { background: #f1c40f; color: #000; box-shadow: 0 3px 0 #f39c12; }
        .btn-select { background: #3498db; box-shadow: 0 3px 0 #2980b9; }
        .btn-selected { background: #2ecc71; box-shadow: 0 3px 0 #27ae60; cursor: default;}
    </style>
</head>

<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div id="top-bar">
            <div class="stats-text" id="level-display">Cấp: 1</div>
            <div class="stats-text" id="star-display">⭐ 0</div>
        </div>

        <div id="score-board" class="hidden">0</div>
        <div id="effects-board"></div>

        <div id="start-screen" class="ui-layer">
            <div class="panel">
                <h1>Flappy Sao</h1>
                <p>Vượt ống để qua màn!</p>
                <div style="font-size: 12px; text-align: left; margin-bottom: 15px; line-height: 1.5;">
                    🛡️ <b>Khiên:</b> Chống 1 lần đâm ống (Tối đa 3)<br>
                    ⭐ <b>Ngôi Sao:</b> Thu thập để mua Trang phục<br>
                    🏁 <b>Đích:</b> Ống vàng + vạch caro đen trắng<br>
                    ⚠️ <b>Chú ý:</b> Chạm đất sẽ CHẾT LUÔN!
                </div>
                <div class="btn-container">
                    <button class="btn btn-blue" id="btn-shop-start">Cửa Hàng</button>
                    <button class="btn" id="btn-start">Bắt Đầu</button>
                </div>
            </div>
        </div>

        <div id="shop-screen" class="ui-layer hidden">
            <div class="panel">
                <h1>Trang Phục</h1>
                <p>Đang có: <span id="shop-stars">0</span> ⭐</p>
                <div class="shop-items" id="shop-list">
                </div>
                <button class="btn" id="btn-close-shop" style="width:100%">Đóng</button>
            </div>
        </div>

        <div id="game-over-screen" class="ui-layer hidden">
            <div class="panel">
                <h1>Kết Thúc</h1>
                <div class="score-box">
                    <div>Điểm: <br><b id="final-score" style="font-size: 24px;">0</b></div>
                    <div>Kỷ Lục: <br><b id="best-score" style="font-size: 24px;">0</b></div>
                </div>
                <div class="btn-container">
                    <button class="btn btn-blue" id="btn-shop-over">Cửa Hàng</button>
                    <button class="btn" id="btn-restart">Chơi Lại</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('game-container');

        // UI Elements
        const screens = {
            start: document.getElementById('start-screen'),
            shop: document.getElementById('shop-screen'),
            gameOver: document.getElementById('game-over-screen')
        };

        const ui = {
            scoreBoard: document.getElementById('score-board'),
            effectsBoard: document.getElementById('effects-board'),
            levelDisplay: document.getElementById('level-display'),
            starDisplay: document.getElementById('star-display'),
            shopList: document.getElementById('shop-list'),
            shopStars: document.getElementById('shop-stars')
        };

        // States
        const GAME_STATE = { READY: 0, PLAYING: 1, GAMEOVER: 2, SHOP: 3 };
        let currentState = GAME_STATE.READY;
        let previousState = GAME_STATE.READY;

        // Game Data
        let frames = 0;
        let score = 0;

        // Level & Finish Logic
        let currentLevel = 1;
        let spawnedPipesCount = 0; // Đếm số ống đã sinh ra trong level

        // Data Storage
        let bestScore = parseInt(localStorage.getItem('flappyStarsBest')) || 0;
        let totalStars = parseInt(localStorage.getItem('flappyTotalStars')) || 0;
        let ownedSkins = JSON.parse(localStorage.getItem('flappySkins')) || ['pink'];
        let currentSkinId = localStorage.getItem('flappyCurrentSkin') || 'pink';

        // Skins Data
        const SKINS = [
            { id: 'pink', name: 'Kẹo Ngọt', color: '#fd79a8', price: 0 },
            { id: 'yellow', name: 'Gà Vàng', color: '#f1c40f', price: 100 },
            { id: 'red', name: 'Chim Điên', color: '#e74c3c', price: 300 },
            { id: 'blue', name: 'Băng Giá', color: '#3498db', price: 500 },
            { id: 'gold', name: 'Hoàng Đế', color: '#f39c12', price: 1000 },
            { id: 'black', name: 'Ninja', color: '#2c3e50', price: 9999 },
        ];

        // Backgrounds theo cấp độ
        const BG_COLORS = ['#70c5ce', '#1abc9c', '#3498db', '#9b59b6', '#d35400', '#2c3e50'];

        // Physics
        let baseGravity = 0, baseJumpForce = 0, basePipeSpeed = 0;
        let pipeSpeed = 0, pipeGap = 0, pipeWidth = 0, groundHeight = 0;

        // Effects state (Thêm flashTimer để làm hiệu ứng nháy sáng màn hình)
        let effects = { shieldCount: 0, invincibleTimer: 0, flashTimer: 0 };

        const FPS = 60;
        const frameInterval = 1000 / FPS;
        let lastTimestamp = 0;

        function saveData() {
            localStorage.setItem('flappyStarsBest', bestScore);
            localStorage.setItem('flappyTotalStars', totalStars);
            localStorage.setItem('flappySkins', JSON.stringify(ownedSkins));
            localStorage.setItem('flappyCurrentSkin', currentSkinId);
            updateTopBar();
        }

        function updateTopBar() {
            ui.levelDisplay.innerText = `Cấp: ${currentLevel}`;
            ui.starDisplay.innerText = `⭐ ${totalStars}`;
        }

        function resizeCanvas() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;

            baseGravity = canvas.height * 0.0006;
            baseJumpForce = canvas.height * -0.012;
            basePipeSpeed = canvas.width * 0.007;

            pipeWidth = canvas.width * 0.15;
            pipeGap = canvas.height * 0.28;
            groundHeight = canvas.height * 0.15;

            if (bird.radius === 0) {
                bird.init();
            } else {
                bird.radius = canvas.height * 0.02;
                bird.x = canvas.width * 0.25;
            }
        }

        window.addEventListener('resize', resizeCanvas);

        function showScreen(screenName) {
            Object.values(screens).forEach(s => s.classList.add('hidden'));
            if (screenName) screens[screenName].classList.remove('hidden');
        }

        function updateEffectsUI() {
            ui.effectsBoard.innerHTML = '';
            if (effects.shieldCount > 0) {
                let shieldsText = '🛡️'.repeat(effects.shieldCount);
                ui.effectsBoard.innerHTML += `<div class="effect-badge">${shieldsText} Khiên: ${effects.shieldCount}/3</div>`;
            }
        }

        // --- BIRD ---
        const bird = {
            x: 0, y: 0, radius: 0, velocity: 0, rotation: 0, color: '#f1c40f',

            init() {
                this.radius = canvas.height * 0.02;
                this.x = canvas.width * 0.25;
                this.y = canvas.height / 2;
                this.velocity = 0;
                this.rotation = 0;
                this.updateSkinColor();
            },

            updateSkinColor() {
                const skin = SKINS.find(s => s.id === currentSkinId);
                this.color = skin ? skin.color : '#f1c40f';
            },

            flap() {
                this.velocity = baseJumpForce;
            },

            update() {
                this.velocity += baseGravity;
                this.y += this.velocity;

                if (this.velocity >= baseJumpForce) {
                    this.rotation = Math.min(Math.PI / 4, (this.velocity / baseJumpForce) * (-Math.PI / 8));
                } else {
                    this.rotation = -Math.PI / 8;
                }
            },

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // Nhấp nháy nếu đang bất tử sau khi vỡ khiên
                if (effects.invincibleTimer > 0 && Math.floor(frames / 5) % 2 === 0) {
                    ctx.globalAlpha = 0.5;
                }

                // 1. Vẽ thân chim
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#000';
                ctx.stroke();

                // 2. Vẽ Mắt chim
                ctx.beginPath();
                ctx.arc(this.radius / 2, -this.radius / 4, this.radius / 3, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
                ctx.beginPath();
                let pupilOffsetX = currentSkinId === 'red' ? 2 : 1;
                ctx.arc(this.radius / 2 + pupilOffsetX, -this.radius / 4, this.radius / 6, 0, Math.PI * 2);
                ctx.fillStyle = '#000';
                ctx.fill();

                // 3. Vẽ Mỏ chim
                ctx.beginPath();
                ctx.moveTo(this.radius * 0.8, 0);
                ctx.lineTo(this.radius * 1.6, 0);
                ctx.lineTo(this.radius * 0.8, this.radius / 2);
                ctx.fillStyle = '#e67e22';
                ctx.fill();
                ctx.stroke();

                // 4. VẼ PHỤ KIỆN THEO TỪNG SKIN
                if (currentSkinId === 'yellow') {
                    // Gà Vàng: Thêm mào gà đỏ
                    ctx.fillStyle = '#e74c3c';
                    ctx.beginPath();
                    ctx.arc(0, -this.radius * 0.8, this.radius * 0.35, 0, Math.PI, true);
                    ctx.fill();
                    ctx.stroke();
                }
                else if (currentSkinId === 'red') {
                    // Chim Điên: Lông mày xếch và đuôi nhọn
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.moveTo(this.radius * 0.1, -this.radius * 0.4);
                    ctx.lineTo(this.radius * 0.9, -this.radius * 0.7);
                    ctx.lineTo(this.radius * 0.9, -this.radius * 0.5);
                    ctx.lineTo(this.radius * 0.1, -this.radius * 0.2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(-this.radius, 0);
                    ctx.lineTo(-this.radius * 1.6, -this.radius * 0.4);
                    ctx.lineTo(-this.radius * 0.9, -this.radius * 0.1);
                    ctx.fill();
                }
                else if (currentSkinId === 'blue') {
                    // Băng giá: Mào pha lê cyan
                    ctx.fillStyle = '#00ffff';
                    ctx.beginPath();
                    ctx.moveTo(-this.radius * 0.2, -this.radius * 0.8);
                    ctx.lineTo(this.radius * 0.2, -this.radius * 1.5);
                    ctx.lineTo(this.radius * 0.5, -this.radius * 0.7);
                    ctx.fill();
                    ctx.stroke();
                }
                else if (currentSkinId === 'black') {
                    // Ninja: Băng đô đỏ có dây bay bay phía sau
                    ctx.fillStyle = '#e74c3c';
                    ctx.fillRect(-this.radius, -this.radius * 0.7, this.radius * 2, this.radius * 0.3);
                    let flapOffset = Math.sin(frames * 0.5) * 5;
                    ctx.beginPath();
                    ctx.moveTo(-this.radius * 0.8, -this.radius * 0.5);
                    ctx.lineTo(-this.radius * 1.8, -this.radius * 0.8 + flapOffset);
                    ctx.lineTo(-this.radius * 1.6, -this.radius * 0.3 + flapOffset);
                    ctx.fill();
                    ctx.stroke();
                }
                else if (currentSkinId === 'pink') {
                    // Kẹo ngọt: Má hồng cute
                    ctx.fillStyle = 'rgba(255, 105, 180, 0.7)';
                    ctx.beginPath();
                    ctx.arc(this.radius * 0.2, this.radius * 0.3, this.radius * 0.25, 0, Math.PI * 2);
                    ctx.fill();
                }
                else if (currentSkinId === 'gold') {
                    // Hoàng Đế: Vương miện vàng
                    ctx.fillStyle = '#f1c40f';
                    ctx.beginPath();
                    ctx.moveTo(-this.radius * 0.6, -this.radius * 0.7);
                    ctx.lineTo(-this.radius * 0.8, -this.radius * 1.5);
                    ctx.lineTo(0, -this.radius * 1.1);
                    ctx.lineTo(this.radius * 0.8, -this.radius * 1.5);
                    ctx.lineTo(this.radius * 0.6, -this.radius * 0.7);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                }

                // 5. Vẽ Khiên bảo vệ
                if (effects.shieldCount > 0) {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius * 1.6, 0, Math.PI * 2);
                    ctx.strokeStyle = '#3498db';
                    ctx.lineWidth = 2 + effects.shieldCount;
                    ctx.stroke();
                    ctx.fillStyle = `rgba(52, 152, 219, ${0.15 * effects.shieldCount})`;
                    ctx.fill();
                }

                ctx.restore();
            }
        };

        // --- COLLECTIBLES ---
        const collectables = {
            items: [],
            types: [
                { id: 'SHIELD', color: '#3498db', symbol: '🛡️', chance: 25 },
                { id: 'STAR', color: '#f1c40f', symbol: '⭐', chance: 75 }
            ],

            init() { this.items = []; },

            spawn(x, y) {
                let rand = Math.random() * 100;
                let sum = 0, selectedType = this.types[0];
                for (let t of this.types) {
                    sum += t.chance;
                    if (rand <= sum) { selectedType = t; break; }
                }

                this.items.push({
                    x: x, y: y, type: selectedType, radius: canvas.height * 0.025, collected: false
                });
            },

            update() {
                for (let i = 0; i < this.items.length; i++) {
                    let item = this.items[i];
                    if (item.collected) continue;

                    item.x -= pipeSpeed;

                    let distToBird = Math.sqrt((bird.x - item.x) ** 2 + (bird.y - item.y) ** 2);
                    if (distToBird < bird.radius + item.radius) {
                        item.collected = true;
                        this.applyEffect(item.type.id);
                    }

                    if (item.x + item.radius < 0) {
                        this.items.splice(i, 1);
                        i--;
                    }
                }
            },

            applyEffect(id) {
                if (id === 'SHIELD') {
                    if (effects.shieldCount < 3) effects.shieldCount++;
                    updateEffectsUI();
                } else if (id === 'STAR') {
                    totalStars++;
                    saveData();
                }
            },

            draw() {
                for (let item of this.items) {
                    if (item.collected) continue;
                    ctx.save();
                    ctx.translate(item.x, item.y);
                    let hover = Math.sin(frames * 0.1) * 5;

                    ctx.beginPath();
                    ctx.arc(0, hover, item.radius, 0, Math.PI * 2);
                    ctx.fillStyle = item.type.color;
                    ctx.fill();
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = '#fff';
                    ctx.stroke();

                    ctx.fillStyle = '#fff';
                    ctx.font = `${item.radius}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(item.type.symbol, 0, hover + 2);
                    ctx.restore();
                }
            }
        };

        // --- PIPES ---
        const pipes = {
            items: [],

            init() { this.items = []; },

            getRequiredPipesForLevel(lv) {
                return 10 + (lv - 1) * 5; // Cấp 1: 10, Cấp 2: 15, Cấp 3: 20...
            },

            update() {
                // Tăng tốc độ theo cấp độ
                let speedMultiplier = 1 + ((currentLevel - 1) * 0.05);
                pipeSpeed = basePipeSpeed * speedMultiplier;
                let currentPipeGap = pipeGap * Math.max(0.7, 1 - ((currentLevel - 1) * 0.02));

                let reqPipes = this.getRequiredPipesForLevel(currentLevel);

                if (this.items.length === 0 ||
                    (canvas.width - this.items[this.items.length - 1].x >= canvas.width * 0.55)) {

                    let minHeight = canvas.height * 0.1;
                    let maxHeight = canvas.height - groundHeight - currentPipeGap - minHeight;
                    let topHeight = Math.random() * (maxHeight - minHeight) + minHeight;

                    // Đếm số ống để gắn mác ống đích
                    spawnedPipesCount++;
                    let isFinishLine = (spawnedPipesCount === reqPipes);

                    this.items.push({
                        x: canvas.width,
                        topHeight: topHeight,
                        passed: false,
                        broken: false,
                        gap: currentPipeGap,
                        isFinishLine: isFinishLine
                    });

                    // Sinh item (Không sinh ở ống đích)
                    if (!isFinishLine && Math.random() < 0.4) {
                        collectables.spawn(canvas.width + pipeWidth / 2, topHeight + currentPipeGap / 2);
                    }
                }

                for (let i = 0; i < this.items.length; i++) {
                    let p = this.items[i];
                    p.x -= pipeSpeed;

                    // KIỂM TRA ĐÃ BAY QUA ỐNG (Không phụ thuộc vào việc ống bị vỡ hay không)
                    if (p.x + pipeWidth < bird.x && !p.passed) {
                        p.passed = true;

                        // Nếu ống KHÔNG bị đâm vỡ thì mới cộng điểm
                        if (!p.broken) {
                            score++;
                            ui.scoreBoard.innerText = score;
                        }

                        // Xử lý khi bay qua ống đích (kể cả khi đâm vỡ bằng khiên vẫn tính qua màn)
                        if (p.isFinishLine) {
                            doLevelUp();
                        }
                    }

                    if (p.x + pipeWidth < 0) {
                        this.items.shift();
                        i--;
                    }
                }
            },

            draw() {
                for (let p of this.items) {
                    if (p.broken) continue;

                    let bottomY = p.topHeight + p.gap;
                    let bottomHeight = canvas.height - groundHeight - bottomY;

                    // Chọn màu ống: Ống thường (Xanh lá), Ống đích (Vàng kim)
                    ctx.fillStyle = p.isFinishLine ? '#f1c40f' : '#2ecc71';
                    ctx.strokeStyle = p.isFinishLine ? '#d35400' : '#27ae60';
                    ctx.lineWidth = 3;

                    // Vẽ ống trên
                    ctx.fillRect(p.x, 0, pipeWidth, p.topHeight);
                    ctx.strokeRect(p.x, 0, pipeWidth, p.topHeight);
                    ctx.fillRect(p.x - 5, p.topHeight - 20, pipeWidth + 10, 20);
                    ctx.strokeRect(p.x - 5, p.topHeight - 20, pipeWidth + 10, 20);

                    // Vẽ ống dưới
                    ctx.fillRect(p.x, bottomY, pipeWidth, bottomHeight);
                    ctx.strokeRect(p.x, bottomY, pipeWidth, bottomHeight);
                    ctx.fillRect(p.x - 5, bottomY, pipeWidth + 10, 20);
                    ctx.strokeRect(p.x - 5, bottomY, pipeWidth + 10, 20);

                    // Vẽ cờ kẻ caro ở giữa ống đích
                    if (p.isFinishLine) {
                        let squareSize = pipeWidth / 3;
                        for (let x = 0; x < 3; x++) {
                            for (let y = 0; y < Math.floor(p.gap / squareSize); y++) {
                                ctx.fillStyle = (x + y) % 2 === 0 ? 'rgba(0,0,0,0.5)' : 'rgba(255,255,255,0.5)';
                                ctx.fillRect(p.x + x * squareSize, p.topHeight + y * squareSize, squareSize, squareSize);
                            }
                        }

                        // Vẽ chữ ĐÍCH
                        ctx.save();
                        ctx.translate(p.x + pipeWidth / 2, p.topHeight - 30);
                        ctx.fillStyle = 'white';
                        ctx.font = 'bold 20px Arial';
                        ctx.textAlign = 'center';
                        ctx.lineWidth = 3;
                        ctx.strokeStyle = 'black';
                        ctx.strokeText("ĐÍCH", 0, 0);
                        ctx.fillText("ĐÍCH", 0, 0);
                        ctx.restore();
                    }
                }
            }
        };

        function doLevelUp() {
            currentLevel++;
            spawnedPipesCount = 0; // Reset đếm số lượng ống cho cấp độ mới

            // Thưởng Ngôi sao khi qua màn (10 sao * Cấp độ)
            totalStars += currentLevel * 10;
            saveData();

            // Thay đổi nền
            container.style.backgroundColor = BG_COLORS[(currentLevel - 1) % BG_COLORS.length];

            // Cập nhật UI
            ui.levelDisplay.innerText = `Cấp: ${currentLevel}`;
            ui.starDisplay.innerText = `⭐ ${totalStars}`;

            // Tạo hiệu ứng nhá sáng 15 frames
            effects.flashTimer = 15;
        }

        // --- GROUND ---
        const ground = {
            x: 0,
            draw() {
                if (currentState === GAME_STATE.PLAYING && pipeSpeed > 0) {
                    this.x -= pipeSpeed;
                    if (this.x <= -canvas.width) this.x = 0;
                }

                ctx.fillStyle = '#ded895';
                ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);
                ctx.fillStyle = '#73bf2e';
                ctx.fillRect(0, canvas.height - groundHeight, canvas.width, 15);
                ctx.strokeStyle = '#543847';
                ctx.lineWidth = 2;

                ctx.save();
                ctx.beginPath();
                for (let i = this.x; i < canvas.width; i += 30) {
                    ctx.moveTo(i, canvas.height - groundHeight);
                    ctx.lineTo(i - 15, canvas.height - groundHeight + 15);
                }
                ctx.stroke();
                ctx.restore();
                ctx.strokeRect(0, canvas.height - groundHeight, canvas.width, 15);
            }
        };

        // --- LOGIC ---
        function checkCollision() {
            if (bird.y + bird.radius >= canvas.height - groundHeight) return true; // Chạm đất là chết luôn

            if (bird.y - bird.radius <= 0) {
                bird.y = bird.radius;
                bird.velocity = 0;
            }

            if (effects.invincibleTimer > 0) return false;

            for (let p of pipes.items) {
                if (p.broken) continue;

                let cx = Math.max(p.x, Math.min(bird.x, p.x + pipeWidth));

                let cyTop = Math.max(0, Math.min(bird.y, p.topHeight));
                let distTop = Math.sqrt((bird.x - cx) ** 2 + (bird.y - cyTop) ** 2);
                if (distTop < bird.radius) return handlePipeDamage(p);

                let bottomY = p.topHeight + p.gap;
                let cyBottom = Math.max(bottomY, Math.min(bird.y, canvas.height - groundHeight));
                let distBottom = Math.sqrt((bird.x - cx) ** 2 + (bird.y - cyBottom) ** 2);
                if (distBottom < bird.radius) return handlePipeDamage(p);
            }
            return false;
        }

        function handlePipeDamage(pipeHit) {
            if (effects.shieldCount > 0) {
                effects.shieldCount--;
                effects.invincibleTimer = FPS * 2;
                pipeHit.broken = true;
                updateEffectsUI();
                return false;
            }
            return true;
        }

        // --- GAME STATES TRASITIONS ---
        function initGame() {
            resizeCanvas();
            bird.init();
            pipes.init();
            collectables.init();

            score = 0;
            currentLevel = 1;
            spawnedPipesCount = 0;

            ui.scoreBoard.innerText = score;
            frames = 0;
            lastTimestamp = performance.now();
            effects = { shieldCount: 0, invincibleTimer: 0, flashTimer: 0 };

            updateTopBar();
            updateEffectsUI();
            container.style.backgroundColor = BG_COLORS[0];
            ui.scoreBoard.classList.add('hidden');
        }

        function startGame() {
            currentState = GAME_STATE.PLAYING;
            showScreen(null);
            ui.scoreBoard.classList.remove('hidden');
            bird.flap();
        }

        function setGameOver() {
            currentState = GAME_STATE.GAMEOVER;
            ui.scoreBoard.classList.add('hidden');
            ui.effectsBoard.innerHTML = '';
            showScreen('gameOver');

            if (score > bestScore) {
                bestScore = score;
                saveData();
            }

            document.getElementById('final-score').innerText = score;
            document.getElementById('best-score').innerText = bestScore;
        }

        // --- SHOP ---
        function openShop() {
            previousState = currentState;
            currentState = GAME_STATE.SHOP;
            showScreen('shop');
            renderShop();
        }

        function closeShop() {
            bird.updateSkinColor();
            if (previousState === GAME_STATE.READY) {
                currentState = GAME_STATE.READY;
                showScreen('start');
            } else if (previousState === GAME_STATE.GAMEOVER) {
                currentState = GAME_STATE.GAMEOVER;
                showScreen('gameOver');
            }
        }

        function renderShop() {
            ui.shopStars.innerText = totalStars;
            ui.shopList.innerHTML = '';

            SKINS.forEach(skin => {
                let isOwned = ownedSkins.includes(skin.id);
                let isSelected = currentSkinId === skin.id;

                let btnHtml = '';
                if (isSelected) {
                    btnHtml = `<button class="shop-btn btn-selected">Đang Dùng</button>`;
                } else if (isOwned) {
                    btnHtml = `<button class="shop-btn btn-select" onclick="selectSkin('${skin.id}')">Chọn</button>`;
                } else {
                    btnHtml = `<button class="shop-btn btn-buy" onclick="buySkin('${skin.id}', ${skin.price})">${skin.price} ⭐</button>`;
                }

                ui.shopList.innerHTML += `
                <div class="shop-item">
                    <div class="skin-preview" style="background-color: ${skin.color}"></div>
                    <strong style="margin-bottom:5px; font-size:14px;">${skin.name}</strong>
                    ${btnHtml}
                </div>
            `;
            });
        }

        window.buySkin = function (id, price) {
            if (totalStars >= price) {
                totalStars -= price;
                ownedSkins.push(id);
                currentSkinId = id;
                saveData();
                renderShop();
            } else {
                alert("Bạn không đủ Ngôi Sao!");
            }
        }

        window.selectSkin = function (id) {
            currentSkinId = id;
            saveData();
            renderShop();
        }

        // --- LOOP & INPUT ---
        function loop(timestamp) {
            requestAnimationFrame(loop);
            if (!timestamp) timestamp = performance.now();
            let deltaTime = timestamp - lastTimestamp;

            if (deltaTime >= frameInterval) {
                lastTimestamp = timestamp - (deltaTime % frameInterval);

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (currentState === GAME_STATE.READY) {
                    ground.draw();
                    bird.draw();
                }
                else if (currentState === GAME_STATE.PLAYING) {
                    if (effects.invincibleTimer > 0) effects.invincibleTimer--;

                    pipes.update();
                    pipes.draw();

                    collectables.update();
                    collectables.draw();

                    ground.draw();

                    bird.update();
                    bird.draw();

                    // Xử lý vẽ flash khi qua màn
                    if (effects.flashTimer > 0) {
                        ctx.fillStyle = `rgba(255, 255, 255, ${effects.flashTimer / 15})`;
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        effects.flashTimer--;
                    }

                    if (checkCollision()) {
                        setGameOver();
                    }
                }
                else if (currentState === GAME_STATE.GAMEOVER) {
                    pipes.draw();
                    collectables.draw();
                    ground.draw();
                    bird.draw();
                }

                frames++;
            }
        }

        function handleInput(e) {
            if (currentState === GAME_STATE.SHOP) return;

            if (e.type === 'keydown' && e.code !== 'Space') return;
            if (e.cancelable && e.type !== 'mousedown') e.preventDefault();

            if (currentState === GAME_STATE.READY) {
                startGame();
            } else if (currentState === GAME_STATE.PLAYING) {
                bird.flap();
            }
        }

        // Events
        window.addEventListener('keydown', handleInput);
        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', handleInput, { passive: false });

        document.getElementById('btn-start').addEventListener('click', startGame);
        document.getElementById('btn-restart').addEventListener('click', () => { initGame(); startGame(); });

        document.getElementById('btn-shop-start').addEventListener('click', openShop);
        document.getElementById('btn-shop-over').addEventListener('click', openShop);
        document.getElementById('btn-close-shop').addEventListener('click', closeShop);

        // Boot
        updateTopBar();
        initGame();
        requestAnimationFrame(loop);
    </script>
</body>
</html>
