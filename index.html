<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Thối - Levels & Skins</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 480px;
            background-color: #70c5ce;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            overflow: hidden;
            transition: background-color 1s;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 10;
            background: rgba(0, 0, 0, 0.4);
        }

        .hidden {
            display: none !important;
        }

        /* Top Bar cho Điểm, Level, Coin */
        #top-bar {
            position: absolute;
            top: 5%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 5;
            pointer-events: none;
        }

        .stats-text {
            font-size: 24px;
            font-weight: bold;
            color: white;
            -webkit-text-stroke: 1px black;
            text-shadow: 2px 2px 0 #000;
        }

        #score-board {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 50px;
            font-weight: bold;
            color: white;
            -webkit-text-stroke: 2px black;
            text-shadow: 3px 3px 0 #000;
            z-index: 5;
            pointer-events: none;
        }

        #effects-board {
            position: absolute;
            top: 25%;
            left: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 5;
            pointer-events: none;
        }

        .effect-badge {
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .panel {
            background: #ded895;
            border: 4px solid #543847;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 0 #543847;
            pointer-events: auto;
            color: #543847;
            width: 85%;
            max-width: 350px;
        }

        .panel h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .panel p {
            font-size: 16px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .score-box {
            background: rgba(255,255,255,0.5);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-around;
        }

        .btn {
            background: #e67e22;
            color: white;
            border: 3px solid #fff;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #d35400;
            transition: transform 0.1s;
            margin: 5px;
            flex: 1;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #d35400;
        }

        .btn-blue { background: #3498db; box-shadow: 0 4px 0 #2980b9; }
        .btn-blue:active { box-shadow: 0 0 0 #2980b9; }
        .btn-green { background: #2ecc71; box-shadow: 0 4px 0 #27ae60; }
        .btn-green:active { box-shadow: 0 0 0 #27ae60; }

        .btn-container {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        /* Shop UI */
        .shop-items {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
            max-height: 250px;
            overflow-y: auto;
        }

        .shop-item {
            background: rgba(255,255,255,0.6);
            border: 2px solid #543847;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .skin-preview {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #000;
            margin-bottom: 5px;
        }

        .shop-btn {
            padding: 5px 10px;
            font-size: 14px;
            border: 2px solid #fff;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            width: 100%;
        }

        .btn-buy { background: #f1c40f; color: #000; box-shadow: 0 3px 0 #f39c12; }
        .btn-select { background: #3498db; box-shadow: 0 3px 0 #2980b9; }
        .btn-selected { background: #2ecc71; box-shadow: 0 3px 0 #27ae60; cursor: default;}
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="top-bar">
        <div class="stats-text" id="level-display">Lv: 1</div>
        <div class="stats-text" id="coin-display">🪙 0</div>
    </div>

    <div id="score-board" class="hidden">0</div>
    <div id="effects-board"></div>

    <div id="start-screen" class="ui-layer">
        <div class="panel">
            <h1>Flappy Legend</h1>
            <p>Vượt 10 ống để qua màn!</p>
            <div style="font-size: 13px; text-align: left; margin-bottom: 15px; line-height: 1.5;">
                🛡️ <b>Khiên:</b> Chống đâm ống (Max 3)<br>
                🪙 <b>Coin:</b> Mua skin trong Shop<br>
                ⚠️ <b>Chạm đất:</b> Chết luôn!
            </div>
            <div class="btn-container">
                <button class="btn btn-blue" id="btn-shop-start">Shop</button>
                <button class="btn" id="btn-start">Play</button>
            </div>
        </div>
    </div>

    <div id="shop-screen" class="ui-layer hidden">
        <div class="panel">
            <h1>Cửa hàng</h1>
            <p>Coin hiện có: <span id="shop-coins">0</span> 🪙</p>
            <div class="shop-items" id="shop-list">
                </div>
            <button class="btn" id="btn-close-shop">Đóng</button>
        </div>
    </div>

    <div id="level-complete-screen" class="ui-layer hidden">
        <div class="panel">
            <h1>Qua Màn!</h1>
            <p>Tuyệt vời, bạn đã hoàn thành Lv <span id="lc-level">1</span></p>
            <div class="score-box" style="flex-direction: column; align-items: center;">
                <div>Thưởng qua màn: <b style="color:#d35400">+<span id="lc-bonus">0</span> 🪙</b></div>
            </div>
            <div class="btn-container">
                <button class="btn btn-blue" id="btn-shop-next">Shop</button>
                <button class="btn btn-green" id="btn-next-level">Next</button>
            </div>
        </div>
    </div>

    <div id="game-over-screen" class="ui-layer hidden">
        <div class="panel">
            <h1>Game Over</h1>
            <div class="score-box">
                <div>Score: <br><b id="final-score" style="font-size: 24px;">0</b></div>
                <div>Best: <br><b id="best-score" style="font-size: 24px;">0</b></div>
            </div>
            <div class="btn-container">
                <button class="btn btn-blue" id="btn-shop-over">Shop</button>
                <button class="btn" id="btn-restart">Restart</button>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('game-container');

    // UI Elements
    const screens = {
        start: document.getElementById('start-screen'),
        shop: document.getElementById('shop-screen'),
        levelComplete: document.getElementById('level-complete-screen'),
        gameOver: document.getElementById('game-over-screen')
    };
    
    const ui = {
        scoreBoard: document.getElementById('score-board'),
        effectsBoard: document.getElementById('effects-board'),
        levelDisplay: document.getElementById('level-display'),
        coinDisplay: document.getElementById('coin-display'),
        shopList: document.getElementById('shop-list'),
        shopCoins: document.getElementById('shop-coins')
    };

    // States
    const GAME_STATE = { READY: 0, PLAYING: 1, GAMEOVER: 2, LEVEL_COMPLETE: 3, SHOP: 4 };
    let currentState = GAME_STATE.READY;
    let previousState = GAME_STATE.READY; // Dùng để quay lại từ shop
    
    // Game Data
    let frames = 0;
    let score = 0;
    let levelScore = 0; // Điểm tính trong level hiện tại
    let currentLevel = 1;
    const PIPES_PER_LEVEL = 10;
    
    // Lưu trữ LocalStorage
    let bestScore = parseInt(localStorage.getItem('flappyLegendBest')) || 0;
    let totalCoins = parseInt(localStorage.getItem('flappyLegendCoins')) || 0;
    let ownedSkins = JSON.parse(localStorage.getItem('flappyLegendSkins')) || ['yellow'];
    let currentSkinId = localStorage.getItem('flappyLegendCurrentSkin') || 'yellow';

    // Skins Data
    const SKINS = [
        { id: 'yellow', name: 'Gà Vàng', color: '#f1c40f', price: 0 },
        { id: 'red', name: 'Chim Điên', color: '#e74c3c', price: 50 },
        { id: 'blue', name: 'Băng Giá', color: '#3498db', price: 100 },
        { id: 'black', name: 'Ninja', color: '#2c3e50', price: 200 }
    ];

    // Backgrounds theo level
    const BG_COLORS = ['#70c5ce', '#2c3e50', '#d35400', '#8e44ad', '#16a085'];

    // Physics (cơ bản)
    let baseGravity = 0, baseJumpForce = 0, basePipeSpeed = 0;
    let pipeSpeed = 0, pipeGap = 0, pipeWidth = 0, groundHeight = 0;

    let effects = { shieldCount: 0, invincibleTimer: 0 };

    const FPS = 60; 
    const frameInterval = 1000 / FPS;
    let lastTimestamp = 0;

    function saveData() {
        localStorage.setItem('flappyLegendBest', bestScore);
        localStorage.setItem('flappyLegendCoins', totalCoins);
        localStorage.setItem('flappyLegendSkins', JSON.stringify(ownedSkins));
        localStorage.setItem('flappyLegendCurrentSkin', currentSkinId);
        updateTopBar();
    }

    function updateTopBar() {
        ui.levelDisplay.innerText = `Lv: ${currentLevel}`;
        ui.coinDisplay.innerText = `🪙 ${totalCoins}`;
    }

    function resizeCanvas() {
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;

        baseGravity = canvas.height * 0.0006;
        baseJumpForce = canvas.height * -0.012;
        basePipeSpeed = canvas.width * 0.007;
        
        pipeWidth = canvas.width * 0.15;
        pipeGap = canvas.height * 0.28; 
        groundHeight = canvas.height * 0.15;

        if (bird.radius === 0) {
            bird.init();
        } else {
            bird.radius = canvas.height * 0.02;
            bird.x = canvas.width * 0.25;
        }
    }

    window.addEventListener('resize', resizeCanvas);

    function showScreen(screenName) {
        Object.values(screens).forEach(s => s.classList.add('hidden'));
        if (screenName) screens[screenName].classList.remove('hidden');
    }

    function updateEffectsUI() {
        ui.effectsBoard.innerHTML = '';
        if (effects.shieldCount > 0) {
            let shieldsText = '🛡️'.repeat(effects.shieldCount);
            ui.effectsBoard.innerHTML += `<div class="effect-badge">${shieldsText} Khiên: ${effects.shieldCount}/3</div>`;
        }
    }

    // --- BIRD ---
    const bird = {
        x: 0, y: 0, radius: 0, velocity: 0, rotation: 0, color: '#f1c40f',

        init() {
            this.radius = canvas.height * 0.02;
            this.x = canvas.width * 0.25;
            this.y = canvas.height / 2;
            this.velocity = 0;
            this.rotation = 0;
            this.updateSkinColor();
        },

        updateSkinColor() {
            const skin = SKINS.find(s => s.id === currentSkinId);
            this.color = skin ? skin.color : '#f1c40f';
        },

        flap() {
            this.velocity = baseJumpForce;
        },

        update() {
            this.velocity += baseGravity;
            this.y += this.velocity;

            if (this.velocity >= baseJumpForce) {
                this.rotation = Math.min(Math.PI / 4, (this.velocity / baseJumpForce) * (-Math.PI / 8));
            } else {
                this.rotation = -Math.PI / 8;
            }
        },

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);

            if (effects.invincibleTimer > 0 && Math.floor(frames / 5) % 2 === 0) {
                ctx.globalAlpha = 0.5;
            }

            // Thân
            ctx.beginPath();
            ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#000';
            ctx.stroke();

            // Mắt
            ctx.beginPath();
            ctx.arc(this.radius / 2, -this.radius / 4, this.radius / 3, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(this.radius / 2 + 1, -this.radius / 4, this.radius / 6, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();

            // Mỏ
            ctx.beginPath();
            ctx.moveTo(this.radius * 0.8, 0);
            ctx.lineTo(this.radius * 1.6, 0);
            ctx.lineTo(this.radius * 0.8, this.radius / 2);
            ctx.fillStyle = '#e67e22';
            ctx.fill();
            ctx.stroke();

            // Phụ kiện Ninja (nếu là skin black)
            if (currentSkinId === 'black') {
                ctx.fillStyle = '#e74c3c'; // Băng đô đỏ
                ctx.fillRect(-this.radius, -this.radius*0.8, this.radius*2, this.radius*0.4);
            }

            // Khiên
            if (effects.shieldCount > 0) {
                ctx.beginPath();
                ctx.arc(0, 0, this.radius * 1.5, 0, Math.PI * 2);
                ctx.strokeStyle = '#3498db';
                ctx.lineWidth = 2 + effects.shieldCount; 
                ctx.stroke();
                ctx.fillStyle = `rgba(52, 152, 219, ${0.2 * effects.shieldCount})`;
                ctx.fill();
            }

            ctx.restore();
        }
    };

    // --- COLLECTIBLES ---
    const collectables = {
        items: [],
        types: [
            { id: 'SHIELD', color: '#3498db', symbol: '🛡️', chance: 30 },
            { id: 'COIN', color: '#f1c40f', symbol: '🪙', chance: 70 }
        ],

        init() { this.items = []; },

        spawn(x, y) {
            let rand = Math.random() * 100;
            let sum = 0, selectedType = this.types[0];
            for (let t of this.types) {
                sum += t.chance;
                if (rand <= sum) { selectedType = t; break; }
            }

            this.items.push({
                x: x, y: y, type: selectedType, radius: canvas.height * 0.025, collected: false
            });
        },

        update() {
            for (let i = 0; i < this.items.length; i++) {
                let item = this.items[i];
                if (item.collected) continue;

                item.x -= pipeSpeed;

                let distToBird = Math.sqrt((bird.x - item.x)**2 + (bird.y - item.y)**2);
                if (distToBird < bird.radius + item.radius) {
                    item.collected = true;
                    this.applyEffect(item.type.id);
                }

                if (item.x + item.radius < 0) {
                    this.items.splice(i, 1);
                    i--;
                }
            }
        },

        applyEffect(id) {
            if (id === 'SHIELD') {
                if (effects.shieldCount < 3) effects.shieldCount++;
                updateEffectsUI();
            } else if (id === 'COIN') {
                totalCoins++;
                saveData();
            }
        },

        draw() {
            for (let item of this.items) {
                if (item.collected) continue;
                ctx.save();
                ctx.translate(item.x, item.y);
                let hover = Math.sin(frames * 0.1) * 5;
                
                ctx.beginPath();
                ctx.arc(0, hover, item.radius, 0, Math.PI * 2);
                ctx.fillStyle = item.type.color;
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#fff';
                ctx.stroke();

                ctx.fillStyle = '#fff';
                ctx.font = `${item.radius}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(item.type.symbol, 0, hover + 2);
                ctx.restore();
            }
        }
    };

    // --- PIPES ---
    const pipes = {
        items: [],

        init() { this.items = []; },

        update() {
            // Tăng tốc độ và thu hẹp khoảng cách theo level
            let levelMultiplier = 1 + (currentLevel * 0.05);
            pipeSpeed = basePipeSpeed * levelMultiplier;
            let currentPipeGap = pipeGap * Math.max(0.7, 1 - (currentLevel * 0.02));

            if (this.items.length === 0 || 
               (canvas.width - this.items[this.items.length - 1].x >= canvas.width * 0.55)) {
                
                let minHeight = canvas.height * 0.1;
                let maxHeight = canvas.height - groundHeight - currentPipeGap - minHeight;
                let topHeight = Math.random() * (maxHeight - minHeight) + minHeight;

                this.items.push({
                    x: canvas.width,
                    topHeight: topHeight,
                    passed: false,
                    broken: false,
                    gap: currentPipeGap
                });

                // 40% sinh ra item
                if (Math.random() < 0.4) {
                    collectables.spawn(canvas.width + pipeWidth/2, topHeight + currentPipeGap/2);
                }
            }

            for (let i = 0; i < this.items.length; i++) {
                let p = this.items[i];
                p.x -= pipeSpeed;

                if (p.x + pipeWidth < bird.x && !p.passed && !p.broken) {
                    score++;
                    levelScore++;
                    ui.scoreBoard.innerText = score;
                    p.passed = true;
                    
                    // Check qua màn
                    if (levelScore >= PIPES_PER_LEVEL) {
                        setLevelComplete();
                    }
                }

                if (p.x + pipeWidth < 0) {
                    this.items.shift();
                    i--; 
                }
            }
        },

        draw() {
            for (let p of this.items) {
                if (p.broken) continue; 

                let bottomY = p.topHeight + p.gap;
                let bottomHeight = canvas.height - groundHeight - bottomY;

                // Màu ống thay đổi theo level
                ctx.fillStyle = currentLevel % 2 === 0 ? '#e67e22' : '#2ecc71';
                ctx.strokeStyle = currentLevel % 2 === 0 ? '#d35400' : '#27ae60';
                ctx.lineWidth = 3;

                ctx.fillRect(p.x, 0, pipeWidth, p.topHeight);
                ctx.strokeRect(p.x, 0, pipeWidth, p.topHeight);
                ctx.fillRect(p.x - 5, p.topHeight - 20, pipeWidth + 10, 20);
                ctx.strokeRect(p.x - 5, p.topHeight - 20, pipeWidth + 10, 20);

                ctx.fillRect(p.x, bottomY, pipeWidth, bottomHeight);
                ctx.strokeRect(p.x, bottomY, pipeWidth, bottomHeight);
                ctx.fillRect(p.x - 5, bottomY, pipeWidth + 10, 20);
                ctx.strokeRect(p.x - 5, bottomY, pipeWidth + 10, 20);
            }
        }
    };

    // --- GROUND ---
    const ground = {
        x: 0,
        draw() {
            if (currentState === GAME_STATE.PLAYING && pipeSpeed > 0) {
                this.x -= pipeSpeed;
                if (this.x <= -canvas.width) this.x = 0;
            }

            ctx.fillStyle = '#ded895';
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);
            ctx.fillStyle = '#73bf2e';
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, 15);
            ctx.strokeStyle = '#543847';
            ctx.lineWidth = 2;
            
            ctx.save();
            ctx.beginPath();
            for(let i = this.x; i < canvas.width; i += 30) {
                ctx.moveTo(i, canvas.height - groundHeight);
                ctx.lineTo(i - 15, canvas.height - groundHeight + 15);
            }
            ctx.stroke();
            ctx.restore();
            ctx.strokeRect(0, canvas.height - groundHeight, canvas.width, 15);
        }
    };

    // --- LOGIC ---
    function checkCollision() {
        if (bird.y + bird.radius >= canvas.height - groundHeight) return true; // Chết luôn
        
        if (bird.y - bird.radius <= 0) {
            bird.y = bird.radius; 
            bird.velocity = 0;
        }

        if (effects.invincibleTimer > 0) return false;

        for (let p of pipes.items) {
            if (p.broken) continue;

            let cx = Math.max(p.x, Math.min(bird.x, p.x + pipeWidth));
            
            let cyTop = Math.max(0, Math.min(bird.y, p.topHeight));
            let distTop = Math.sqrt((bird.x - cx) ** 2 + (bird.y - cyTop) ** 2);
            if (distTop < bird.radius) return handlePipeDamage(p);

            let bottomY = p.topHeight + p.gap;
            let cyBottom = Math.max(bottomY, Math.min(bird.y, canvas.height - groundHeight));
            let distBottom = Math.sqrt((bird.x - cx) ** 2 + (bird.y - cyBottom) ** 2);
            if (distBottom < bird.radius) return handlePipeDamage(p);
        }
        return false;
    }

    function handlePipeDamage(pipeHit) {
        if (effects.shieldCount > 0) {
            effects.shieldCount--;
            effects.invincibleTimer = FPS * 2; 
            pipeHit.broken = true; 
            updateEffectsUI();
            return false;
        }
        return true; 
    }

    function changeBackground() {
        container.style.backgroundColor = BG_COLORS[(currentLevel - 1) % BG_COLORS.length];
    }

    // --- GAME STATES TRASITIONS ---
    function initGame(fullReset = false) {
        resizeCanvas();
        bird.init();
        pipes.init();
        collectables.init();
        
        if (fullReset) {
            score = 0;
            currentLevel = 1;
        }
        levelScore = 0;
        
        ui.scoreBoard.innerText = score;
        frames = 0;
        lastTimestamp = performance.now();
        effects = { shieldCount: 0, invincibleTimer: 0 };
        
        updateTopBar();
        updateEffectsUI();
        changeBackground();
        ui.scoreBoard.classList.add('hidden');
    }

    function startGame() {
        currentState = GAME_STATE.PLAYING;
        showScreen(null);
        ui.scoreBoard.classList.remove('hidden');
        bird.flap();
    }

    function setGameOver() {
        currentState = GAME_STATE.GAMEOVER;
        ui.scoreBoard.classList.add('hidden');
        ui.effectsBoard.innerHTML = '';
        showScreen('gameOver');
        
        if (score > bestScore) {
            bestScore = score;
            saveData();
        }

        document.getElementById('final-score').innerText = score;
        document.getElementById('best-score').innerText = bestScore;
    }

    function setLevelComplete() {
        currentState = GAME_STATE.LEVEL_COMPLETE;
        ui.scoreBoard.classList.add('hidden');
        showScreen('levelComplete');
        
        let bonus = currentLevel * 10;
        totalCoins += bonus;
        saveData();

        document.getElementById('lc-level').innerText = currentLevel;
        document.getElementById('lc-bonus').innerText = bonus;
        currentLevel++;
    }

    // --- SHOP ---
    function openShop() {
        previousState = currentState;
        currentState = GAME_STATE.SHOP;
        showScreen('shop');
        renderShop();
    }

    function closeShop() {
        bird.updateSkinColor();
        if (previousState === GAME_STATE.READY) {
            currentState = GAME_STATE.READY;
            showScreen('start');
        } else if (previousState === GAME_STATE.LEVEL_COMPLETE) {
            currentState = GAME_STATE.LEVEL_COMPLETE;
            showScreen('levelComplete');
        } else if (previousState === GAME_STATE.GAMEOVER) {
            currentState = GAME_STATE.GAMEOVER;
            showScreen('gameOver');
        }
    }

    function renderShop() {
        ui.shopCoins.innerText = totalCoins;
        ui.shopList.innerHTML = '';

        SKINS.forEach(skin => {
            let isOwned = ownedSkins.includes(skin.id);
            let isSelected = currentSkinId === skin.id;
            
            let btnHtml = '';
            if (isSelected) {
                btnHtml = `<button class="shop-btn btn-selected">Đang Dùng</button>`;
            } else if (isOwned) {
                btnHtml = `<button class="shop-btn btn-select" onclick="selectSkin('${skin.id}')">Chọn</button>`;
            } else {
                btnHtml = `<button class="shop-btn btn-buy" onclick="buySkin('${skin.id}', ${skin.price})">${skin.price} 🪙</button>`;
            }

            ui.shopList.innerHTML += `
                <div class="shop-item">
                    <div class="skin-preview" style="background-color: ${skin.color}"></div>
                    <strong style="margin-bottom:5px; font-size:14px;">${skin.name}</strong>
                    ${btnHtml}
                </div>
            `;
        });
    }

    window.buySkin = function(id, price) {
        if (totalCoins >= price) {
            totalCoins -= price;
            ownedSkins.push(id);
            currentSkinId = id;
            saveData();
            renderShop();
        } else {
            alert("Không đủ Coin!");
        }
    }

    window.selectSkin = function(id) {
        currentSkinId = id;
        saveData();
        renderShop();
    }

    // --- LOOP & INPUT ---
    function loop(timestamp) {
        requestAnimationFrame(loop);
        if (!timestamp) timestamp = performance.now();
        let deltaTime = timestamp - lastTimestamp;

        if (deltaTime >= frameInterval) {
            lastTimestamp = timestamp - (deltaTime % frameInterval);

            // Xóa canvas, background dùng css transition
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (currentState === GAME_STATE.READY) {
                ground.draw();
                bird.draw();
            } 
            else if (currentState === GAME_STATE.PLAYING) {
                if (effects.invincibleTimer > 0) effects.invincibleTimer--;
                
                pipes.update();
                pipes.draw();
                
                collectables.update();
                collectables.draw();

                ground.draw();
                
                bird.update();
                bird.draw();

                if (checkCollision()) {
                    setGameOver();
                }
            } 
            else if (currentState === GAME_STATE.GAMEOVER || currentState === GAME_STATE.LEVEL_COMPLETE) {
                pipes.draw();
                collectables.draw();
                ground.draw();
                bird.draw(); 
            }
            // Trạng thái SHOP không cần update logic game

            frames++;
        }
    }

    function handleInput(e) {
        if (currentState === GAME_STATE.SHOP || currentState === GAME_STATE.LEVEL_COMPLETE || currentState === GAME_STATE.GAMEOVER) return;
        
        if (e.type === 'keydown' && e.code !== 'Space') return;
        if (e.cancelable && e.type !== 'mousedown') e.preventDefault();

        if (currentState === GAME_STATE.READY) {
            startGame();
        } else if (currentState === GAME_STATE.PLAYING) {
            bird.flap();
        }
    }

    // Events
    window.addEventListener('keydown', handleInput);
    canvas.addEventListener('mousedown', handleInput);
    canvas.addEventListener('touchstart', handleInput, { passive: false });

    document.getElementById('btn-start').addEventListener('click', startGame);
    document.getElementById('btn-restart').addEventListener('click', () => { initGame(true); startGame(); });
    document.getElementById('btn-next-level').addEventListener('click', () => { initGame(false); startGame(); });
    
    // Nút Shop
    document.getElementById('btn-shop-start').addEventListener('click', openShop);
    document.getElementById('btn-shop-over').addEventListener('click', openShop);
    document.getElementById('btn-shop-next').addEventListener('click', openShop);
    document.getElementById('btn-close-shop').addEventListener('click', closeShop);

    // Boot
    updateTopBar();
    initGame(true);
    requestAnimationFrame(loop);
</script>
</body>
</html>
